/**
 * Retorna o ID Token atual (Firebase JWT).
 * Sempre busca um token fresco — o SDK renova automaticamente se expirado.
 * Enviado como Bearer no header Authorization para o backend NestJS.
 */
async function getIdToken() {
  const user = firebaseAuth.currentUser;
  if (!user) return null;
  return user.getIdToken();
}

/**
 * Faz uma chamada autenticada à API NestJS.
 * Injeta automaticamente o Bearer token no header Authorization.
 */
async function apiFetch(path, options = {}) {
  const token = await getIdToken();
  return fetch(`${API_URL}${path}`, {
    ...options,
    headers: {
      'Content-Type':  'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
      ...(options.headers ?? {}),
    },
  });
}

  const [email,      setEmail]      = useState("");
  const [pass,       setPass]       = useState("");

  const [loadingEM,  setLoadingEM]  = useState(false);
  const [authError,  setAuthError]  = useState(null);

  // Mapa de erros Firebase → mensagem em português
  const fmtError = (err) => ({
    "auth/popup-closed-by-user":                    "Login cancelado. Tente novamente.",
    "auth/popup-blocked":                           "Popup bloqueado. Permita popups para este site.",
    "auth/account-exists-with-different-credential":"Este e-mail já está vinculado a outro provedor.",
    "auth/invalid-email":                           "E-mail inválido.",
    "auth/wrong-password":                          "Senha incorreta.",
    "auth/invalid-credential":                      "E-mail ou senha incorretos.",
    "auth/user-not-found":                          "Usuário não encontrado.",
    "auth/user-disabled":                           "Esta conta foi desativada.",
    "auth/too-many-requests":                       "Muitas tentativas. Tente mais tarde.",
    "auth/network-request-failed":                  "Erro de rede. Verifique sua conexão.",
  }[err.code] ?? err.message ?? "Erro desconhecido.";

  // Login via popup (GitHub ou Google)
  const handlePopup = async (provider, setLoading) => {
    setLoading(true);
    setAuthError(null);
    try {
      await firebase.auth.signInWithPopup(firebaseAuth, provider);
      // onAuthStateChanged no root detecta e redireciona automaticamente
    } catch (err) {
      setAuthError(fmtError(err));
      setLoading(false);
    }

    e.preventDefault();

    setAuthError(null);
    try {
      await firebase.auth.signInWithEmailAndPassword(firebaseAuth, email.trim(), pass);

      setAuthError(fmtError(err));
      setLoadingEM(false);
    }
  };
